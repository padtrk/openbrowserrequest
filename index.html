<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Data Browser Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; line-height: 1.5; }
    button { margin: 6px 6px 6px 0; padding: 8px 12px; }
    pre { background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; }
    .ok { color: green; }
    .fail { color: darkred; }
  </style>
</head>
<body>
  <h1>UK Open Data API Test Bench</h1>
  <p>Click each button to test whether the API works directly in the browser via fetch().</p>

  <button onclick="testApi('Bank Holidays','https://www.gov.uk/bank-holidays.json')">Bank Holidays</button>
  <button onclick="testApi('UK Police','https://data.police.uk/api/crimes-street/all-crime?lat=51.5072&lng=-0.1276')">UK Police</button>
  <button onclick="testApi('Postcodes','https://api.postcodes.io/postcodes/SW1A2AA')">Postcodes</button>
  <button onclick=\"testApi('TfL','https://api.tfl.gov.uk/Line/Mode/tube/Status')\">TfL</button>\n  <button onclick=\"testApi('ONS','https://api.beta.ons.gov.uk/v1/datasets')\">ONS</button>

  <h2>Status</h2>
  <div id="status">No tests run yet.</div>

  <h2>Response Preview</h2>
  <pre id="output">Waiting...</pre>

  <script>
    async function testApi(name, url) {
      const status = document.getElementById('status');
      const output = document.getElementById('output');
      status.textContent = `Testing ${name}...`;
      output.textContent = 'Loading...';

      try {
        const response = await fetch(url);
        const text = await response.text();

        status.innerHTML = `<span class="ok">✓ ${name} works in browser (${response.status})</span>`;
        output.textContent = text.slice(0, 1200);
      } catch (err) {
        status.innerHTML = `<span class="fail">✗ ${name} failed: ${err.message}</span>`;
        output.textContent = err.stack || err.message;
      }
    }
  </script>
</body>
</html>
